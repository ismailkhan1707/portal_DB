<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>university Portal</title>
    <!-- Bootstrap CSS — gives us ready-made buttons, cards, forms etc. -->
    <!-- We load it from the internet (CDN) so we don't need to download it -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <div class="d-flex align-items-center gap-3">
        <span class="navbar-brand fw-bold">🎓 University Portal</span>
        <!-- Home button always visible -->
        <a href="/logout" class="btn btn-outline-light btn-sm">🏠 Home</a>
    </div>
    <div>
        {% if session.user_id %}
            <span class="text-white me-3">Hello, {{ session.user_name }}</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        {% else %}
            <a href="/login" class="btn btn-outline-light btn-sm">Login</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">

    <!-- Flash Messages (success/error notifications) -->
    <!-- This loops through any messages Flask sent and displays them -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endwith %}

    <!-- 
        This is where each page's unique content goes.
        Child templates replace this block with their own content.
    -->
    {% block content %}{% endblock %}

</div>

<!-- Bootstrap JS (needed for dismissible alerts, etc.) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
