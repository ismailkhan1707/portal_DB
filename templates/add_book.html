{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow">
      <div class="card-header bg-success text-white">
        <h4 class="mb-0">➕ Add New Book</h4>
      </div>
      <div class="card-body p-4">
        <form method="POST">

          <div class="row">
            <div class="col-md-8 mb-3">
              <label class="form-label">Book Title <span class="text-danger">*</span></label>
              <input type="text" name="title" class="form-control"
                     placeholder="e.g. Introduction to Algorithms"
                     value="{{ form_data.get('title') or '' }}" required>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Year</label>
              <input type="number" name="year" class="form-control"
                     placeholder="e.g. 2023" min="1000" max="2100"
                     value="{{ form_data.get('year') or '' }}">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Author <span class="text-danger">*</span></label>
              <input type="text" name="author" class="form-control"
                     placeholder="e.g. Thomas H. Cormen"
                     value="{{ form_data.get('author') or '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Category</label>
              <input type="text" name="category" class="form-control"
                     placeholder="e.g. Computer Science"
                     value="{{ form_data.get('category') or '' }}">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">ISBN</label>
              <input type="text" name="isbn" class="form-control"
                     placeholder="e.g. 978-3-16-148410-0"
                     value="{{ form_data.get('isbn') or '' }}">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Publisher</label>
              <input type="text" name="publisher" class="form-control"
                     placeholder="e.g. MIT Press"
                     value="{{ form_data.get('publisher') or '' }}">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">
              Total Quantity <span class="text-danger">*</span>
            </label>
            <input type="number" name="quantity" class="form-control"
                   placeholder="How many copies does the library have?"
                   min="1" value="{{ form_data.get('quantity') or '' }}" required>
            <div class="form-text">
              Available copies will automatically be set to this number.
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">💾 Add Book</button>
            <a href="/books" class="btn btn-outline-secondary">Cancel</a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
