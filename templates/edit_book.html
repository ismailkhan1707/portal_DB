{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow">
      <div class="card-header bg-warning">
        <h4 class="mb-0">✏️ Edit Book — {{ book[1] }}</h4>
      </div>
      <div class="card-body p-4">
        <form method="POST">

          <div class="row">
            <div class="col-md-8 mb-3">
              <label class="form-label">Book Title <span class="text-danger">*</span></label>
              <input type="text" name="title" class="form-control"
                     value="{{ book[1] }}" required>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Year</label>
              <input type="number" name="year" class="form-control"
                     value="{{ book[6] or '' }}" min="1000" max="2100">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Author <span class="text-danger">*</span></label>
              <input type="text" name="author" class="form-control"
                     value="{{ book[2] }}" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Category</label>
              <input type="text" name="category" class="form-control"
                     value="{{ book[3] or '' }}">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">
                ISBN <span class="text-muted">(cannot be changed)</span>
              </label>
              <!-- Disabled so ISBN can't be edited — protects data integrity -->
              <input type="text" class="form-control bg-light"
                     value="{{ book[4] or 'N/A' }}" disabled>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Publisher</label>
              <input type="text" name="publisher" class="form-control"
                     value="{{ book[5] or '' }}">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Total Quantity <span class="text-danger">*</span></label>
            <input type="number" name="quantity" class="form-control"
                   value="{{ book[7] }}" min="1" required>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning">💾 Save Changes</button>
            <a href="/books" class="btn btn-outline-secondary">Cancel</a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
